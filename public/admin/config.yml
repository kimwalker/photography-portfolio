backend:
  name: git-gateway
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "photos"
    label: "Photos"
    label_singular: "Photo"
    folder: "src/content/photos"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    fields:
      - label: "Image"
        name: "image"
        widget: "image"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Internal reference — used to identify this photo in project sequences."
      - label: "Alt text"
        name: "alt"
        widget: "string"
        required: false
      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Date"
        name: "date"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    summary: "{{order}} — {{title}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "Lowercase, hyphens only. E.g. domestic-office"
      - label: "Date"
        name: "date"
        widget: "string"
        hint: "E.g. 2020–2021 or Spring 2024"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Controls order in the Projects grid. 1 = first."
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
      - label: "Photo Sequence"
        name: "photoSequence"
        widget: "list"
        required: false
        hint: "Add photos in order. Set layout to 'pair' on two consecutive photos to show them side by side."
        fields:
          - label: "Photo title"
            name: "photo"
            widget: "string"
            hint: "Must match the Title field of the photo exactly."
          - label: "Layout"
            name: "layout"
            widget: "select"
            options:
              - { label: "Single (full width)", value: "single" }
              - { label: "Pair (side by side)", value: "pair" }
            default: "single"

  - name: "galleries"
    label: "Collections"
    label_singular: "Collection"
    folder: "src/content/galleries"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "Lowercase, hyphens only. E.g. street"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
      - label: "Photo Sequence"
        name: "photoSequence"
        widget: "list"
        required: false
        hint: "Add photos in order. Set layout to 'pair' on two consecutive photos to show them side by side."
        fields:
          - label: "Photo title"
            name: "photo"
            widget: "string"
            hint: "Must match the Title field of the photo exactly."
          - label: "Layout"
            name: "layout"
            widget: "select"
            options:
              - { label: "Single (full width)", value: "single" }
              - { label: "Pair (side by side)", value: "pair" }
            default: "single"
