backend:
  name: git-gateway
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "photos"
    label: "Photos"
    label_singular: "Photo"
    folder: "src/content/photos"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    fields:
      - label: "Image"
        name: "image"
        widget: "image"
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Internal reference only — not shown publicly."
      - label: "Alt text"
        name: "alt"
        widget: "string"
        required: false
      - label: "Featured on Home"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Projects"
        name: "projects"
        widget: "list"
        required: false
        hint: "Comma-separated project slugs. E.g. domestic-office"
      - label: "Collections"
        name: "collections"
        widget: "list"
        required: false
        hint: "Comma-separated collection slugs. E.g. street"
      - label: "Date"
        name: "date"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    summary: "{{order}} — {{title}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "Lowercase, hyphens only. E.g. domestic-office"
      - label: "Date"
        name: "date"
        widget: "string"
        hint: "E.g. 2020–2021 or Spring 2024"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true

  - name: "galleries"
    label: "Collections"
    label_singular: "Collection"
    folder: "src/content/galleries"
    create: true
    format: json
    extension: json
    identifier_field: "title"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
      - label: "Cover Image"
        name: "cover"
        widget: "image"
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
